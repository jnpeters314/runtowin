name = "campaignshq"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Rate limiting: 5 requests per minute per IP on the /api/chat endpoint.
# Cloudflare only supports period=10 or period=60 (seconds), not hourly windows.
# Uses Cloudflare's native rate limiting — no external service required.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
